services:
  tsreport_editor_build:
    build:
      context: ../..
      dockerfile: server/node/Dockerfile
      target: development
      args:
        APP_SOURCE: server/build/src
    image: tsreport_editor_build:1.0
    user: "node"
    working_dir: /var/node
    init: true
    volumes:
      - ../nfs:/var/nfs
      - ./output:/var/output
    env_file:
     - ../node/.env
    command: "bash -c 'npm run build && rm -rf /var/output/.next && cp -a .next /var/output/'"
