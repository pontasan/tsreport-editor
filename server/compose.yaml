name: tsreport-editor-dev

services:
  tsreport_editor_db:
    build: ./db/
    image: tsreport_editor_db:1.0
    init: true
    user: "54321:54321"
    volumes:
      - ./db/pgdata:/var/pgdata
      - ./db/ddl:/var/ddl
    ports:
      - "52437:15432"
    networks:
      tsreport_editor_net:
        ipv4_address: 172.31.0.30
    environment:
      - PGDATA=/var/pgdata/data
      - DB_NAME=TSREPORT_EDITOR_DB
      - DB_PORT=15432
      - DB_PASS=postgres1234
    shm_size: 1.2gb
  tsreport_editor_node:
    build: ./node/
    image: tsreport_editor_node:1.0
    user: "node"
    working_dir: /var/node
    init: true
    ports:
      - "52005:3000"
      # Dedicated MCP listener (SystemProperty mcp.port, default 52006).
      # Changing mcp.port requires updating this mapping too.
      - "52006:52006"
      # Workspace activity WebSocket listener for editor hot reload.
      - "52007:52007"
    networks:
      tsreport_editor_net:
        ipv4_address: 172.31.0.10
    volumes:
      - ../src:/var/node
      - ../tests:/var/tests:ro
      - /var/node/node_modules
      - ./nfs:/var/nfs
      - .npm:/home/node/.npm
      - ./build/output:/var/output
    env_file:
     - ./node/.env
    environment:
      - REPORT_BATCH_TOKEN=${REPORT_BATCH_TOKEN:-tsreport-report-batch-local}
    # Running cluster mode with --no-daemon fails; running pm2 list first makes it succeed.
    # https://stackoverflow.com/questions/66296203/azure-app-service-linux-next-js-app-pm2-not-possible-to-set-cluster-mode
    # Adding command pm2 list before pm2-runtime solves the issue, I suppose that the command pm2 list initializes the pm2 and sets the proper path for pm2-runtime.
    # command: "tail -f /dev/null"
    command: "bash -c 'npm install && npm run dev'"
  # Dedicated crond container that triggers the report print online batch on the
  # API server. The cadence lives entirely in the mounted crontab
  # (server/crond/schedule.txt), so it can be changed without rebuilding the image.
  tsreport_editor_cron:
    build: ./crond/
    image: tsreport_editor_cron:1.0
    init: true
    networks:
      tsreport_editor_net:
        ipv4_address: 172.31.0.40
    volumes:
      - ./crond/schedule.txt:/var/crond/schedule.txt:ro
    environment:
      - REPORT_BATCH_TOKEN=${REPORT_BATCH_TOKEN:-tsreport-report-batch-local}
    depends_on:
      - tsreport_editor_node
  tsreport_editor_nginx:
    build: ./nginx/
    image: tsreport_editor_nginx:1.0
    init: true
    ports:
      - "52085:80"
      - "52448:443"
    networks:
      tsreport_editor_net:
        ipv4_address: 172.31.0.20
    volumes:
      - ./nginx/cert:/var/cert
      - ./nginx/conf:/var/config
      - ../logs/nginx:/var/log/nginx
      - ./nfs:/var/nfs
networks:
  tsreport_editor_net:
    ipam:
      driver: default
      config:
        - subnet: "172.31.0.0/24"
          gateway: 172.31.0.1
