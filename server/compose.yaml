name: tsreport-editor-dev

services:
  tsreport_editor_db:
    build: ./db/
    image: tsreport_editor_db:1.0
    init: true
    user: "54321:54321"
    volumes:
      - ./db/pgdata:/var/pgdata
      - ./db/ddl:/var/ddl
    ports:
      - "52437:15432"
    networks:
      tsreport_editor_net:
        ipv4_address: 172.31.0.30
    environment:
      - PGDATA=/var/pgdata/data
      - DB_NAME=TSREPORT_EDITOR_DB
      - DB_PORT=15432
      - DB_PASS=postgres1234
    shm_size: 1.2gb
  tsreport_editor_node:
    build:
      context: ..
      dockerfile: server/node/Dockerfile
      target: development
      args:
        APP_SOURCE: src
    image: tsreport_editor_node_dev:1.0
    user: "node"
    working_dir: /var/node
    init: true
    ports:
      - "52005:3000"
      # Dedicated MCP listener (SystemProperty mcp.port, default 52006).
      # Changing mcp.port requires updating this mapping too.
      - "52006:52006"
      # Workspace activity WebSocket listener for editor hot reload.
      - "52007:52007"
    networks:
      tsreport_editor_net:
        ipv4_address: 172.31.0.10
    volumes:
      - ../tests:/var/tests:ro
      - ./nfs:/var/nfs
      - ./build/output:/var/output
    env_file:
     - ./node/.env
    environment:
      - REPORT_BATCH_TOKEN=${REPORT_BATCH_TOKEN:-tsreport-report-batch-local}
    command: "npm run dev"
    develop:
      watch:
        - action: sync
          path: ../src
          target: /var/node
          ignore:
            - node_modules/
            - .next/
            - .tsreport-core/
            - .tsreport-react/
            - "*.tsbuildinfo"
            - package.json
            - package-lock.json
        - action: rebuild
          path: ../src/package.json
        - action: rebuild
          path: ../src/package-lock.json
  # Dedicated crond container that triggers the report print online batch on the
  # API server. The cadence lives entirely in the mounted crontab
  # (server/crond/schedule.txt), so it can be changed without rebuilding the image.
  tsreport_editor_cron:
    build: ./crond/
    image: tsreport_editor_cron:1.0
    init: true
    networks:
      tsreport_editor_net:
        ipv4_address: 172.31.0.40
    volumes:
      - ./crond/schedule.txt:/var/crond/schedule.txt:ro
    environment:
      - REPORT_BATCH_TOKEN=${REPORT_BATCH_TOKEN:-tsreport-report-batch-local}
    depends_on:
      - tsreport_editor_node
  tsreport_editor_nginx:
    build: ./nginx/
    image: tsreport_editor_nginx:1.0
    init: true
    depends_on:
      - tsreport_editor_node
    ports:
      - "52085:80"
      - "52448:443"
    networks:
      tsreport_editor_net:
        ipv4_address: 172.31.0.20
    volumes:
      - ./nginx/cert:/var/cert
      - ./nginx/conf:/var/config
      - ../logs/nginx:/var/log/nginx
      - ./nfs:/var/nfs
networks:
  tsreport_editor_net:
    ipam:
      driver: default
      config:
        - subnet: "172.31.0.0/24"
          gateway: 172.31.0.1
