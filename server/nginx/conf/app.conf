error_page 404 /404.html;
location = /40x.html {
    return 404 '404 Not Found';
    internal;
}
error_page 500 502 503 504 /50x.html;
location = /50x.html {
    return 500 'This site is currently inaccessible.<br/>Please wait for a while before trying to access this site.';
    internal;
}
# config
charset utf-8;
server_tokens off;
server_name localhost;
sendfile on;
tcp_nopush on;
tcp_nodelay on;
gzip on;
gzip_disable "msie6";
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript image/svg+xml font/otf font/ttf;
gzip_proxied any;
# Port specification is unnecessary in production.
proxy_set_header X-Forwarded-Host $host:52448;
# for Next.js
location /_next/webpack-hmr {
    proxy_pass http://tsreport_editor_node:3000/_next/webpack-hmr;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}
location = /api/workspace-activity {
    proxy_pass http://tsreport_editor_node:52007;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
}

# Request body-size limits are set per entry point: the default is deliberately
# tight and only the endpoints that legitimately receive large bodies are opened
# up, so a stray endpoint never accepts a huge POST. This file is included by
# BOTH the HTTP (:80) and HTTPS (:443) server blocks in nginx.conf, so every
# limit below applies to both. Each value is >= the corresponding
# application-side cap, which remains the authoritative per-endpoint enforcer.

# application (default: small JSON / metadata APIs and pages)
location / {
    proxy_pass http://tsreport_editor_node:3000/;
    client_max_body_size 3M;
}
# Font upload (per-account font files; system font collections can exceed 180 MiB)
location /api/fonts {
    proxy_pass http://tsreport_editor_node:3000/api/fonts;
    client_max_body_size 260M;
}
# Workspace asset upload (images and other files)
location = /api/workspace {
    proxy_pass http://tsreport_editor_node:3000/api/workspace;
    client_max_body_size 3M;
}
location /api/workspace/ {
    proxy_pass http://tsreport_editor_node:3000/api/workspace/;
    client_max_body_size 32M;
}
# Print output stored to history (rendered multi-page PDFs)
location /api/print-history {
    proxy_pass http://tsreport_editor_node:3000/api/print-history;
    client_max_body_size 64M;
}
# Print API data payload (structured report data)
location /api/report/print/ {
    proxy_pass http://tsreport_editor_node:3000/api/report/print/;
    client_max_body_size 16M;
}
# MCP JSON-RPC payload: an inline template plus its data source, so larger than
# the print-data limit. Exact match so it does not shadow the cookie-
# authenticated /api/mcp-settings endpoints.
location = /api/mcp {
    proxy_pass http://tsreport_editor_node:3000/api/mcp;
    client_max_body_size 32M;
}
# Admin: full workspace archive restore (a known-large POST)
location = /api/editor-data/import {
    proxy_pass http://tsreport_editor_node:3000/api/editor-data/import;
    client_max_body_size 1024M;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
}
